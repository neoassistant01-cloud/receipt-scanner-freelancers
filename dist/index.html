<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{--p:#2563EB;--pd:#1D4ED8;--pl:#DBEAFE;--s:#059669;--w:#D97706;--d:#DC2626;--bg:#F3F4F6;--sf:#FFF;--t:#111827;--ts:#6B7280;--bd:#E5E7EB;--sh:0 1px 3px rgba(0,0,0,.1);--r:12px;--rs:8px;}

body{position:fixed;inset:0}
.app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}

.oc{flex:1;display:flex;flex-direction:column;overflow:hidden}
.os{flex:1;position:relative;overflow:hidden}
.od{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;transition:transform .3s ease,opacity .3s ease}

.colt{color:rgba(255,255,255,.5);font-size:14px;background:rgba(0,0,0,.4);padding:8px 16px;border-radius:20px}

.cb2{width:68px;height:68px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.3);cursor:pointer;display:flex;align-items:center;justify-content:center}

.sb2.on{background:var(--w)}
.t{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#111827;color:#fff;padding:12px 20px;border-radius:var(--r);font-size:14px;font-weight:500;z-index:300;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.t.on{opacity:1;transform:translateX(-50%) translateY(0)}
.t.ok{background:var(--s)}
.t.er{background:var(--d)}
.spn{width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--p);border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
.ef{display:flex;flex-direction:column;gap:0}
.er{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd);gap:8px}
.er:last-child{border:none}
.er .l{flex:0 0 70px;font-size:12px;color:var(--ts);font-weight:500}
.er input{flex:1;border:none;outline:none;font-size:14px;font-weight:500;background:transparent;color:var(--t);min-width:0}
.fi{position:absolute;inset:0;opacity:0;cursor:pointer}
.st2{font-size:12px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.08em;padding:20px 16px 6px}
.cw2{padding:20px;background:var(--sf);border-radius:var(--r);margin:16px;box-shadow:var(--sh)}
.bc{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.br{display:flex;align-items:center;gap:8px;font-size:12px}
.bl{min-width:110px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t)}
.bt{flex:1;height:22px;background:var(--bg);border-radius:6px;overflow:hidden}
.bf2{height:100%;background:var(--p);border-radius:6px;transition:width .5s ease;min-width:28px}
.bf2 span{padding-right:5px;font-size:10px;font-weight:700;color:#fff}
.ba{min-width:65px;text-align:right;font-weight:700;font-size:13px}
.mn2{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0}
.mn2 h3{font-size:16px;font-weight:700}
.mn2 button{background:none;border:none;cursor:pointer;color:var(--p);font-size:22px;padding:4px 8px}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes sp{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

</style>
</head>

const DB={get(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set(k,v){localStorage.setItem(k,JSON.stringify(v))},load(){st.receipts=this.get("rece")||[];st.user=this.get("user");st.conns=this.get("conns")||{quickbooks:null,xero:null};},saveR(r){const a=st.receipts;const i=a.findIndex(x=>x.id===r.id);if(i>=0)a[i]=r;else a.unshift(r);st.receipts=a;this.set("rece",a);},delR(id){st.receipts=st.receipts.filter(r=>r.id!==id);this.set("rece",st.receipts);}};

const MV=["Staples","Office Depot","Amazon","Best Buy","FedEx","UPS Store","Starbucks","Chipotle","Delta Airlines","Marriott","Shell Gas","Chevron","Verizon","Adobe","Canva","Fiverr","WeWork","Uber","Lyft","Grubhub"];
const CM={Staples:"supplies","Office Depot":"supplies",Amazon:"supplies","Best Buy":"supplies",FedEx:"travel","UPS Store":"travel",Starbucks:"meals",Chipotle:"meals","Delta Airlines":"travel",Marriott:"travel","Shell Gas":"car_truck",Chevron:"car_truck",Verizon:"utilities",Adobe:"supplies",Canva:"supplies",Fiverr:"contract_labor",WeWork:"rent_lease",Uber:"travel",Lyft:"travel",Grubhub:"meals"};
function mExt(){var v=MV[Math.floor(Math.random()*MV.length)];var d=Math.floor(Math.random()*90);var dt=new Date();dt.setDate(dt.getDate()-d);var a=(Math.random()*400+5).toFixed(2);return{vendor:v,date:dt.toISOString().split("T")[0],amount:"$"+a,category:CM[v]||"other",lineItems:[]};}
function cl(id){var c=CATS.find(function(x){return x.id===id;});return c?c.label:id;}
function fd(d){return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function mn(d){return d.toLocaleDateString("en-US",{month:"long",year:"numeric"});}
function go(s){st.screen=s;render();}
function $nav(a){document.querySelectorAll(".nv").forEach(function(n){n.classList.toggle("on",n.dataset.n===a);});}

function render(){DB.load();var app=document.getElementById("app");app.innerHTML=splash()+login()+onboard()+homeScr()+captureScr()+previewScr()+detailScr()+searchScr()+reportsScr()+settingsScr();document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});var sc=document.getElementById("sc-"+st.screen);if(sc)sc.classList.add("active");$nav(st.screen);if(st.screen==="home")renderReceiptList();if(st.screen==="reports")renderReport();if(st.screen==="search")renderSearch();}

function splash(){return '<div class="screen" id="sc-splash"><div class="sp"><div class="sl">'+S.logo+'</div><h1>ReceiptSnap</h1><p>Scan. Categorize. Done.<br/>Never lose a receipt again.</p><button class="b bp" onclick="go('login')">Get Started</button></div></div>';}

function login(){return '<div class="screen" id="sc-login"><div style="display:flex;flex-direction:column;height:100%;padding:20px"><div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0 32px"><button class="ib" onclick="go('splash')">'+S.back+'</button><span style="font-size:15px;font-weight:600">Sign In</span><span></span></div><div style="flex:1;display:flex;flex-direction:column;justify-content:center"><div class="fg"><label>Email</label><input class="fc" type="email" id="login-email" placeholder="you@example.com"/></div><div class="fg"><label>Password</label><input class="fc" type="password" id="login-pass" placeholder=""/></div><button class="b bp bf" style="margin-top:8px" onclick="doLogin()">Sign In</button><button class="b bs bf" style="margin-top:12px" onclick="doRegister()">Create Account</button></div></div></div>';}

function doLogin(){var e=document.getElementById("login-email").value;var p=document.getElementById("login-pass").value;if(!e||!p){toast("Enter email and password","er");return;}DB.set("user",{email:e,name:e.split("@")[0]});DB.set("onboard",false);st.user=DB.get("user");go(DB.get("onboard")?"home":"onboard");}
function doRegister(){var e=document.getElementById("login-email").value;var p=document.getElementById("login-pass").value;if(!e||!p){toast("Enter email and password","er");return;}DB.set("user",{email:e,name:e.split("@")[0]});DB.set("onboard",false);st.user=DB.get("user");go("onboard");}

function onboard(){var slides=[{t:"Snap Receipts",d:"Point your camera at any receipt. Our AI reads it instantly.",icon:S.camera},{t:"Auto-Categorize",d:"IRS Schedule C categories suggested automatically. One tap to confirm.",icon:S.receipt},{t:"Export Anywhere",d:"Send directly to QuickBooks or Xero with a single tap.",icon:S.export}];var dots="";var dts="";for(var i=0;i<slides.length;i++){dots+='<div class="odt'+(i===0?' on':'')+'" id="obdot-'+i+'"></div>';dts+='<div class="od" id="ob-'+i+'" style="opacity:'+(i===0?1:0)+';transform:translateX('+(i===0?0:(i>0?'100%':'-100%'))+'%)"><div class="oi">'+slides[i].icon+'</div><h2>'+slides[i].t+'</h2><p>'+slides[i].d+'</p></div>';}return '<div class="screen" id="sc-onboard"><div class="oc"><div class="os">'+dts+'</div><div class="odts">'+dots+'</div><div class="oa"><button class="b bs" onclick="finishOb()">Skip</button><button class="b bp" onclick="nextOb()">Next</button></div></div></div>';}
function nextOb(){var total=3;st.obS=(st.obS+1)%total;updateOb();}
function updateOb(){document.querySelectorAll(".od").forEach(function(el,i){el.style.opacity=i===st.obS?'1':'0';el.style.transform='translateX('+((i-st.obS)*100)+'%)';});document.querySelectorAll(".odt").forEach(function(el,i){el.classList.toggle('on',i===st.obS);});}
function finishOb(){DB.set("onboard",true);go('home');}

function homeScr(){return '<div class="screen" id="sc-home"><div class="hdr"><h1>Receipts</h1><div class="hdr-a"><button class="ib" onclick="go('search')">'+S.search+'</button><button class="ib" onclick="go('settings')">'+S.user+'</button></div></div><div id="receipt-list" class="rl"></div><div class="es" id="empty-list" style="display:none"><div style="display:none">'+S.receipt+'</div><h3>No receipts yet</h3><p>Tap the + button to scan your first receipt</p></div><button class="fab" onclick="go('capture')">'+S.plus+'</button><div class="bnav"><div class="nv on" data-n="home" onclick="go('home')">'+S.home+'<span>Home</span></div><div class="nv" data-n="reports" onclick="go('reports')">'+S.reports+'<span>Reports</span></div><div class="nv" data-n="settings" onclick="go('settings')">'+S.settings+'<span>Settings</span></div></div></div>';}

function renderReceiptList(){var list=document.getElementById('receipt-list');var empty=document.getElementById('empty-list');if(!list)return;if(st.receipts.length===0){list.style.display='none';empty.style.display='flex';return;}list.style.display='flex';empty.style.display='none';list.innerHTML=st.receipts.map(function(r){return '<div class="rc" onclick="openDetail(\'+r.id+\'\)"><div class="ct">'+(r.img?'<img src="'+r.img+'"/>':S.receipt)+'</div><div class="ci"><div class="vn">'+(r.vendor||'Unknown')+'</div><div class="mt"><span>'+fd(r.date)+'</span><span class="cp cb">'+cl(r.category)+'</span></div></div><div class="cr"><div class="am">'+r.amount+'</div>'+(r.exported?'<span class="cp cg">Exported</span>':'')+'</div></div>';}).join('');}

function openDetail(id){st.cur=st.receipts.find(function(r){return r.id===id;})||null;go('detail');}
function openPreview(data){st.prev=data;go('preview');}

function captureScr(){return '<div class="screen" id="sc-capture"><div class="cw"><div class="chd"><button onclick="go('home')">Cancel</button><span style="font-size:15px;font-weight:600">Scan Receipt</span><button id="flash-btn" class="ib" style="color:#fff" onclick="toggleFlash()">'+S.flash+'</button></div><div class="cp2" id="capture-area"><div class="col"><span class="colt">Align receipt within frame</span></div></div><div class="ca2"><button class="sb2" onclick="document.getElementById('file-input').click()">'+S.gallery+'</button><button class="cb2" onclick="doCapture()"><div class="cbi2"></div></button><div style="width:46px"></div></div><input type="file" id="file-input" class="fi" accept="image/*" onchange="doGalleryImport(event)"/></div></div>';}
function toggleFlash(){st.flash=!st.flash;var btn=document.getElementById('flash-btn');if(btn)btn.innerHTML=st.flash?S.flashOff:S.flash;}
function doCapture(){toast("Processing...","");var _this=this;setTimeout(function(){var ext=mExt();var r=Object.assign({},ext,{id:uuid(),createdAt:new Date().toISOString(),img:null,exported:false});openPreview(r);},800);}
function doGalleryImport(e){var f=e.target.files[0];if(!f)return;var reader=new FileReader();var _this=this;reader.onload=function(ev){toast("Processing...","");setTimeout(function(){var ext=mExt();var r=Object.assign({},ext,{id:uuid(),createdAt:new Date().toISOString(),img:ev.target.result,exported:false});openPreview(r);},800);};reader.readAsDataURL(f);}

function previewScr(){if(!st.prev)return go('home');return '<div class="screen" id="sc-preview"><div class="hdr"><button class="ib" onclick="go('home')">'+S.close+'</button><span style="font-size:15px;font-weight:600">Review</span><span></span></div>'+(st.prev.img?'<div class="di"><img src="'+st.prev.img+'"/></div>':'')+'<div style="padding:20px"><p style="font-size:13px;color:var(--ts);margin-bottom:16px">Confirm or edit the extracted details below</p><div class="ef"><div class="er"><span class="l">Vendor</span><input id="pv-vendor" value="'+(st.prev.vendor||'')+'"/></div><div class="er"><span class="l">Date</span><input id="pv-date" type="date" value="'+(st.prev.date||'')+'"/></div><div class="er"><span class="l">Amount</span><input id="pv-amount" value="'+(st.prev.amount||'')+'"/></div><div class="er" style="cursor:pointer" onclick="showCatPicker('prev')"><span class="l">Category</span><span style="flex:1;font-weight:500;color:var(--p)" id="pv-cat-label">'+cl(st.prev.category)+'</span>'+S.chevron+'</div></div><button class="b bp bf" style="margin-top:20px" onclick="saveReceipt()">Save Receipt</button></div></div>';}

function showCatPicker(mode){var modal=document.getElementById('cat-modal');if(!modal)return;var catHtml=CATS.map(function(c){var sel=(mode==='prev'?st.prev:st.cur).category===c.id?' sel':'';return '<div class="cm'+sel+'" onclick="selectCat(''+c.id+'',''+mode+'')">'+c.label+'</div>';}).join('');modal.querySelector('.mb').innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="font-size:17px;font-weight:700">Select Category</h3><button class="ib" onclick="closeModal()">'+S.close+'</button></div><div class="cg2">'+catHtml+'</div>';modal.classList.add('on');}
function selectCat(id,mode){if(mode==='prev'){st.prev.category=id;var el=document.getElementById('pv-cat-label');if(el)el.textContent=cl(id);}else if(mode==='detail'){if(st.cur){st.cur.category=id;DB.saveR(st.cur);renderDetail();}}closeModal();}
function closeModal(){document.querySelectorAll('.mo').forEach(function(m){m.classList.remove('on');});}
function saveReceipt(){var vendor=document.getElementById('pv-vendor');var date=document.getElementById('pv-date');var amount=document.getElementById('pv-amount');if(!st.prev)return;var r=Object.assign({},st.prev,{vendor:vendor?vendor.value:st.prev.vendor,date:date?date.value:st.prev.date,amount:amount?amount.value:st.prev.amount});DB.saveR(r);toast("Receipt saved!","ok");go('home');}

function detailScr(){if(!st.cur)return go('home');var r=st.cur;return '<div class="screen" id="sc-detail"><div class="hdr"><button class="ib" onclick="go('home')">'+S.back+'</button><span style="font-size:15px;font-weight:600">Receipt</span><button class="ib" onclick="deleteReceipt()">'+S.trash+'</button></div>'+(r.img?'<div class="di"><img src="'+r.img+'"/></div>':'<div class="di">'+S.receipt+'</div>')+'<div class="db"><div class="er"><span class="l">Vendor</span><input id="dv-vendor" value="'+(r.vendor||'')+'" readonly/></div><div class="er"><span class="l">Date</span><input id="dv-date" type="date" value="'+(r.date||'')+'" onchange="updateDetail('date',this.value)"/></div><div class="er"><span class="l">Amount</span><input id="dv-amount" value="'+(r.amount||'')+'" readonly/></div><div class="er" style="cursor:pointer" onclick="showCatPicker('detail')"><span class="l">Category</span><span style="flex:1;font-weight:500;color:var(--p)">'+cl(r.category)+'</span>'+S.chevron+'</div></div><div class="da"><button class="b bs" style="flex:1" onclick="exportReceipt('quickbooks')">'+S.qb+' QuickBooks</button><button class="b bs" style="flex:1" onclick="exportReceipt('xero')">'+S.xero+' Xero</button></div><div class="mo" id="cat-modal"><div class="mb"></div></div></div>';}

function renderDetail(){if(!st.cur)return;var r=st.cur;var vendor=document.getElementById('dv-vendor');var date=document.getElementById('dv-date');var amount=document.getElementById('dv-amount');if(vendor)vendor.value=r.vendor||'';if(date)date.value=r.date||'';if(amount)amount.value=r.amount||'';}
function updateDetail(field,value){if(!st.cur)return;st.cur[field]=value;DB.saveR(st.cur);toast("Saved","ok");}
function deleteReceipt(){if(!st.cur)return;if(!confirm("Delete this receipt?"))return;DB.delR(st.cur.id);toast("Receipt deleted");go('home');}
function exportReceipt(provider){var conns=DB.get("conns")||{};var connected=conns[provider];if(!connected){toast("Connect "+provider.charAt(0).toUpperCase()+provider.slice(1)+" in Settings first","er");return;}if(!st.cur)return;st.cur.exported=true;DB.saveR(st.cur);toast("Exported to "+provider.charAt(0).toUpperCase()+provider.slice(1)+"!","ok");render();}

function searchScr(){return '<div class="screen" id="sc-search"><div class="hdr"><button class="ib" onclick="go('home')">'+S.back+'</button><h1>Search</h1><span></span></div><div class="sb"><div class="sw">'+S.search+'<input class="fc" id="search-input" placeholder="Vendor name..." value="'+st.query+'" oninput="doSearch(this.value)"/></div></div><div class="fch2"><div class="fch'+(st.filt==='all'?' on':'')+'" onclick="setFilter('all')">All</div><div class="fch'+(st.filt==='meals'?' on':'')+'" onclick="setFilter('meals')">Meals</div><div class="fch'+(st.filt==='travel'?' on':'')+'" onclick="setFilter('travel')">Travel</div><div class="fch'+(st.filt==='supplies'?' on':'')+'" onclick="setFilter('supplies')">Supplies</div><div class="fch'+(st.filt==='other'?' on':'')+'" onclick="setFilter('other')">Other</div></div><div id="search-results" class="rl"></div></div>';}
function doSearch(q){st.query=q;renderSearch();}
function setFilter(f){st.filt=f;renderSearch();}
function renderSearch(){var results=document.getElementById('search-results');if(!results)return;var rs=st.receipts.slice();if(st.query)rs=rs.filter(function(r){return r.vendor&&r.vendor.toLowerCase().indexOf(st.query.toLowerCase())!==-1;});if(st.filt!=='all')rs=rs.filter(function(r){return r.category===st.filt;});if(rs.length===0){results.innerHTML='<div class="es"><h3>No results</h3><p>Try a different search or filter</p></div>';return;}results.innerHTML=rs.map(function(r){return '<div class="rc" onclick="openDetail(\'+r.id+\'\)"><div class="ct">'+(r.img?'<img src="'+r.img+'"/>':S.receipt)+'</div><div class="ci"><div class="vn">'+(r.vendor||'Unknown')+'</div><div class="mt"><span>'+fd(r.date)+'</span><span class="cp cb">'+cl(r.category)+'</span></div></div><div class="cr"><div class="am">'+r.amount+'</div></div></div>';}).join('');}

function reportsScr(){return '<div class="screen" id="sc-reports"><div class="hdr"><h1>Reports</h1></div><div id="report-content"></div><div class="bnav"><div class="nv" data-n="home" onclick="go('home')">'+S.home+'<span>Home</span></div><div class="nv on" data-n="reports" onclick="go('reports')">'+S.reports+'<span>Reports</span></div><div class="nv" data-n="settings" onclick="go('settings')">'+S.settings+'<span>Settings</span></div></div></div>';}
function renderReport(){var content=document.getElementById('report-content');if(!content)return;var m=st.rptMonth;var ms=m.getMonth();var my=m.getFullYear();var total=st.receipts.filter(function(r){var d=new Date(r.date);return d.getMonth()===ms&&d.getFullYear()===my;});var catTotals={};total.forEach(function(r){var amt=parseFloat((r.amount||'$0').replace('$',''));catTotals[r.category]=catTotals[r.category]||0;catTotals[r.category]+=amt;});var sorted=Object.entries(catTotals).sort(function(a,b){return b[1]-a[1];});var grand=sorted.reduce(function(s,v){return s+v[1];},0);var maxAmt=sorted.length?sorted[0][1]:1;if(sorted.length===0){content.innerHTML='<div class="es"><h3>'+mn(m)+'</h3><p>No receipts this month</p><button class="b bs" style="margin-top:12px" onclick="exportCSV()">Export CSV</button></div>';return;}content.innerHTML='<div class="mn2"><button onclick="prevMonth()">&#8249;</button><h3>'+mn(m)+'</h3><button onclick="nextMonth()">&#8250;</button></div><div class="cw2"><p style="font-size:13px;color:var(--ts)">Total: <strong>$'+grand.toFixed(2)+'</strong> across <strong>'+total.length+'</strong> receipts</p><div class="bc">'+sorted.map(function(c){var pct=(c[1]/maxAmt*100).toFixed(1);return '<div class="br"><span class="bl">'+cl(c[0])+'</span><div class="bt"><div class="bf2" style="width:'+pct+'%"><span>$'+c[1].toFixed(0)+'</span></div></div><span class="ba">$'+c[1].toFixed(2)+'</span></div>';}).join('')+'</div><button class="b bs bf" style="margin-top:16px" onclick="exportCSV()">Export CSV</button></div>';}}
function prevMonth(){st.rptMonth=new Date(st.rptMonth.getFullYear(),st.rptMonth.getMonth()-1,1);renderReport();}
function nextMonth(){st.rptMonth=new Date(st.rptMonth.getFullYear(),st.rptMonth.getMonth()+1,1);renderReport();}
function exportCSV(){var m=st.rptMonth;var ms=m.getMonth();var my=m.getFullYear();var total=st.receipts.filter(function(r){var d=new Date(r.date);return d.getMonth()===ms&&d.getFullYear()===my;});if(total.length===0){toast("No receipts to export","er");return;}var rows=[["Date","Vendor","Amount","Category"]];total.forEach(function(r){rows.push([r.date||'',r.vendor||'',r.amount||'',cl(r.category)||'']);});var csv=rows.map(function(r){return r.map(function(v){return '"'+v+'"';}).join(',');}).join('\n');var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='receipts-'+my+'-'+(ms+1)+'.csv';a.click();URL.revokeObjectURL(url);toast("CSV exported!","ok");}

function settingsScr(){var conns=DB.get("conns")||{};var qb=conns.quickbooks;var xr=conns.xero;return '<div class="screen" id="sc-settings"><div class="hdr"><button class="ib" onclick="go('home')">'+S.back+'</button><h1>Settings</h1><span></span></div><div class="st2">Profile</div><div class="ss"><div class="sr"><div class="si b">'+S.user+'</div><div class="sn"><div class="t">'+(st.user&&st.user.name?st.user.name:'User')+'</div><div class="s">'+(st.user&&st.user.email?st.user.email:'Not signed in')+'</div></div></div></div><div class="st2">Integrations</div><div class="ss"><div class="sr" onclick="connectQB()"><div class="si g">'+S.qb+'</div><div class="sn"><div class="t">QuickBooks</div><div class="s">Export receipts as expenses</div></div><span class="bg2 '+(qb?'ok':'no')+'">'+(qb?'Connected':'Not connected')+'</span>'+S.chevron+'</div><div class="sr" onclick="connectXero()"><div class="si a">'+S.xero+'</div><div class="sn"><div class="t">Xero</div><div class="s">Export receipts as expenses</div></div><span class="bg2 '+(xr?'ok':'no')+'">'+(xr?'Connected':'Not connected')+'</span>'+S.chevron+'</div></div><div class="st2">Data</div><div class="ss"><div class="sr" onclick="exportCSV()"><div class="si b">'+S.export+'</div><div class="sn"><div class="t">Export All (CSV)</div><div class="s">Download all receipts as spreadsheet</div></div>'+S.chevron+'</div><div class="sr" onclick="clearData()"><div class="si r">'+S.trash+'</div><div class="sn"><div class="t">Clear All Data</div><div class="s">Delete all receipts permanently</div></div>'+S.chevron+'</div></div><div class="st2">Account</div><div class="ss"><div class="sr" onclick="doLogout()"><div class="si r">'+S.logout+'</div><div class="sn"><div class="t">Sign Out</div></div>'+S.chevron+'</div></div><div class="bnav"><div class="nv" data-n="home" onclick="go('home')">'+S.home+'<span>Home</span></div><div class="nv" data-n="reports" onclick="go('reports')">'+S.reports+'<span>Reports</span></div><div class="nv on" data-n="settings" onclick="go('settings')">'+S.settings+'<span>Settings</span></div></div></div>';}

function connectQB(){DB.set("conns",Object.assign({},DB.get("conns")||{},{quickbooks:{connected:true,companyId:"mock-company"}}));toast("QuickBooks connected!","ok");render();}
function connectXero(){DB.set("conns",Object.assign({},DB.get("conns")||{},{xero:{connected:true,tenantId:"mock-tenant"}}));toast("Xero connected!","ok");render();}
function clearData(){if(!confirm("Delete ALL receipts? This cannot be undone."))return;DB.set("receipts",[]);st.receipts=[];toast("All data cleared");render();}
function doLogout(){DB.set("user",null);st.user=null;go("splash");}

document.addEventListener("DOMContentLoaded",function(){var user=DB.get("user");var onboard=DB.get("onboard");if(user&&onboard){st.user=user;st.screen="home";}else if(user&&!onboard){st.user=user;st.screen="onboard";}else{st.screen="splash";}render();});

</script>
</body>
</html>
